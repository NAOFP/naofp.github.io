<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAOFP</title>

    <style>
        html, body {
            margin: 0;
            padding: 0;
            background-color: black;
            overflow-x: hidden;
        }

        .container {
            width: 100%;
            line-height: 0; /* ✅ removes tiny image gaps */
        }

        .container img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>

<body>

    <div class="container">
        <img src="header.png">
    </div>

</body>
</html>
